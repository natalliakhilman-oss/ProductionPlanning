name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Clean (no cached views)
        run: rm -rf ProductionPlanning/obj ProductionPlanning/bin
        working-directory: .

      - name: Restore
        run: dotnet restore
        working-directory: ProductionPlanning

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: ProductionPlanning

      - name: Publish
        run: dotnet publish -c Release -o ./publish --no-build
        working-directory: ProductionPlanning
